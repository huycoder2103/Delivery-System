version: '3.8'
services:
  # 1. Cấu hình Database SQL Server
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: sql_server_db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrongPassword123
    ports:
      - "1433:1433"

  # 2. Cấu hình Web App (Tomcat)
  web:
    build: .
    container_name: delivery_app
    ports:
      - "8080:8080"
    depends_on:
      - db
    links:
      - db